{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight sm:text-5xl mb-4">
            CodeSentinel
        </h1>
        <p class="text-xl text-gray-500 max-w-2xl mx-auto">
            AI-powered static analysis and commit risk prediction.
        </p>
    </div>

    <div class="w-full max-w-xl bg-white p-8 rounded-xl shadow-sm border border-gray-100" x-data="scanForm()">
        <form @submit.prevent="submitScan">
            <div class="mb-6">
                <label for="repo-path" class="block text-sm font-medium text-gray-700 mb-2">
                    Repository URL or Local Path
                </label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm3.293 1.293a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 01-1.414-1.414L7.586 10 5.293 7.707a1 1 0 010-1.414zM11 12a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="text" id="repo-path" x-model="repoPath"
                           class="focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-3 border outline-none transition-colors"
                           placeholder="https://github.com/owner/repo or /path/to/local/repo">
                </div>
                <p class="mt-2 text-sm text-red-600" x-show="error" x-text="error"></p>
            </div>

            <button type="submit" 
                    :disabled="isLoading || !repoPath.trim()"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gray-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                <span x-show="!isLoading">Scan Codebase</span>
                <span x-show="isLoading" class="flex items-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Initializing...
                </span>
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('scanForm', () => ({
            repoPath: '',
            isLoading: false,
            error: '',
            
            async submitScan() {
                this.error = '';
                this.isLoading = true;
                
                try {
                    const response = await fetch('/api/scan_repo', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-Token': document.querySelector('meta[name="csrf-token"]').content
                        },
                        body: JSON.stringify({ path: this.repoPath })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        window.location.href = `/scan/${data.scan_id}`;
                    } else {
                        this.error = data.error || 'Failed to start scan.';
                        this.isLoading = false;
                    }
                } catch (err) {
                    this.error = 'Network error occurred.';
                    this.isLoading = false;
                }
            }
        }));
    });
</script>
{% endblock %}

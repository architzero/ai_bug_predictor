{% extends "base.html" %}

{% block content %}
<div x-data="dashboard()" class="space-y-8">
    <div class="flex justify-between items-end border-b border-gray-200 pb-5">
        <div>
            <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">Your Repositories</h2>
            <p class="mt-2 text-sm text-gray-500">Select a repository to begin static analysis and bug prediction.</p>
        </div>
        
        <div class="flex items-center space-x-4">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                    </svg>
                </div>
                <input type="text" x-model="searchQuery" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 sm:text-sm" placeholder="Search repositories...">
            </div>
        </div>
    </div>

    <!-- Error State -->
    <div x-show="error" class="bg-red-50 p-4 rounded-md" style="display: none;">
        <p class="text-sm text-red-700" x-text="error"></p>
    </div>

    <!-- Loading State -->
    <div x-show="isLoading" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <template x-for="i in 6">
            <div class="bg-white border border-gray-200 rounded-lg p-6 animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-3/4 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-1/2 mb-6"></div>
                <div class="flex justify-between">
                    <div class="h-8 bg-gray-200 rounded w-24"></div>
                    <div class="h-8 bg-gray-200 rounded w-8"></div>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty State -->
    <div x-show="!isLoading && filteredRepos.length === 0" class="text-center py-12" style="display: none;">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <h3 class="mt-2 text-sm font-medium text-gray-900">No repositories found</h3>
        <p class="mt-1 text-sm text-gray-500">We couldn't find any supported repositories matching your criteria.</p>
    </div>

    <!-- Repo Grid -->
    <div x-show="!isLoading && filteredRepos.length > 0" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3" style="display: none;">
        <template x-for="repo in filteredRepos" :key="repo.name">
            <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow flex flex-col justify-between">
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-lg font-medium text-gray-900 truncate" :title="repo.name" x-text="repo.name"></h3>
                        <span x-show="repo.private" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                            Private
                        </span>
                    </div>
                    <div class="flex items-center space-x-4 text-sm text-gray-500 mb-6">
                        <span class="flex items-center">
                            <span class="w-3 h-3 rounded-full mr-1.5" :class="getLanguageColor(repo.language)"></span>
                            <span x-text="repo.language"></span>
                        </span>
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                            </svg>
                            <span x-text="repo.stars"></span>
                        </span>
                    </div>
                </div>
                
                <div>
                    <button @click="startScan(repo.clone_url)" 
                            :disabled="scanningRepo === repo.clone_url"
                            class="w-full inline-flex justify-center items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span x-show="scanningRepo !== repo.clone_url">Scan Codebase</span>
                        <span x-show="scanningRepo === repo.clone_url" class="flex items-center">
                            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Starting...
                        </span>
                    </button>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('dashboard', () => ({
            repos: [],
            searchQuery: '',
            isLoading: true,
            error: null,
            scanningRepo: null,
            
            async init() {
                try {
                    const response = await fetch('/api/repos');
                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.error || 'Failed to fetch repositories');
                    }
                    this.repos = await response.json();
                } catch (err) {
                    this.error = err.message;
                } finally {
                    this.isLoading = false;
                }
            },
            
            get filteredRepos() {
                if (this.searchQuery === '') {
                    return this.repos;
                }
                const query = this.searchQuery.toLowerCase();
                return this.repos.filter(repo => repo.name.toLowerCase().includes(query));
            },
            
            getLanguageColor(lang) {
                const colors = {
                    'Python': 'bg-blue-500',
                    'JavaScript': 'bg-yellow-400',
                    'TypeScript': 'bg-blue-400',
                    'Java': 'bg-red-500',
                    'Go': 'bg-cyan-500',
                    'Ruby': 'bg-red-600',
                    'C++': 'bg-pink-500',
                    'Unknown': 'bg-gray-400'
                };
                return colors[lang] || 'bg-gray-400';
            },
            
            async startScan(cloneUrl) {
                this.scanningRepo = cloneUrl;
                this.error = null;
                
                try {
                    const response = await fetch('/api/scan_repo', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-Token': document.querySelector('meta[name="csrf-token"]').content
                        },
                        body: JSON.stringify({ path: cloneUrl })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        window.location.href = `/scan/${data.scan_id}`;
                    } else {
                        this.error = data.error || 'Failed to start scan.';
                        this.scanningRepo = null;
                    }
                } catch (err) {
                    this.error = 'Network error occurred.';
                    this.scanningRepo = null;
                }
            }
        }));
    });
</script>
{% endblock %}
